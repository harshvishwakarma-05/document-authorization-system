{% extends "documents/base.html" %}

{% block title %}Sign Up | DocuChain Django{% endblock %}

{% block content %}
<section class="login-section">
  <form method="post" class="tool-panel login-panel">
    {% csrf_token %}
    <div class="panel-heading">
      <h2>Create User</h2>
      <p>Create an account to save and verify your documents.</p>
    </div>

    {{ form.non_field_errors }}

    <label class="field">
      <span>Username</span>
      {{ form.username }}
      {{ form.username.errors }}
    </label>

    <label class="field">
      <span>Email</span>
      {{ form.email }}
      {{ form.email.errors }}
    </label>

    <label class="field">
      <span>Password</span>
      <div class="password-control">
        {{ form.password1 }}
        <button type="button" class="toggle-password" data-target="id_password1">Show</button>
      </div>
      {{ form.password1.errors }}
    </label>

    <label class="field">
      <span>Confirm password</span>
      <div class="password-control">
        {{ form.password2 }}
        <button type="button" class="toggle-password" data-target="id_password2">Show</button>
      </div>
      {{ form.password2.errors }}
    </label>

    <button type="submit">Create Account</button>
    <p class="helper-text">Already registered? <a href="{% url 'login' %}">Login</a></p>
  </form>
</section>
{% endblock %}
