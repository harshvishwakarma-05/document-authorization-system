{% extends "documents/base.html" %}

{% block title %}Forgot Password | DocuChain Django{% endblock %}

{% block content %}
<section class="login-section">
  <form method="post" class="tool-panel login-panel">
    {% csrf_token %}
    <div class="panel-heading">
      <h2>Forgot Password</h2>
      <p>Enter your username and email to set a new password.</p>
    </div>

    {{ form.non_field_errors }}

    <label class="field">
      <span>Username</span>
      {{ form.username }}
      {{ form.username.errors }}
    </label>

    <label class="field">
      <span>Email</span>
      {{ form.email }}
      {{ form.email.errors }}
    </label>

    <label class="field">
      <span>New password</span>
      <div class="password-control">
        {{ form.new_password }}
        <button type="button" class="toggle-password" data-target="id_new_password">Show</button>
      </div>
      {{ form.new_password.errors }}
    </label>

    <label class="field">
      <span>Confirm password</span>
      <div class="password-control">
        {{ form.confirm_password }}
        <button type="button" class="toggle-password" data-target="id_confirm_password">Show</button>
      </div>
      {{ form.confirm_password.errors }}
    </label>

    <button type="submit">Change Password</button>
    <p class="helper-text">Remembered password? <a href="{% url 'login' %}">Login</a></p>
  </form>
</section>
{% endblock %}
